<!DOCTYPE html>
<html>
<head>
    <title>Password generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Password generator</h1>

    <div>
        <input type="checkbox" id="lowercase" onchange="appendSymbols()">
        <label for="lowercase">Lowercase</label>
    </div>

    <div>
        <input type="checkbox" id="uppercase" onchange="appendSymbols()">
        <label for="uppercase">Uppercase</label>
    </div>

    <div>
        <input type="checkbox" id="numbers" onchange="appendSymbols()">
        <label for="numbers">Numbers</label>
    </div>

    <div>
        <input type="checkbox" id="special" onchange="appendSymbols()">
        <label for="special">Special</label>
    </div>

    <div>
        <input type="checkbox" id="custom" onchange="toggleCustom()">
        <label for="custom">Custom</label>
        <input type="text" id="customsymbols" placeholder="Input characters" style="display: none;" onchange="appendSymbols()">
    </div>

    <div>
        <label for="length">Password length:</label>
        <input type="range" id="length" min="1" max="30" value="10" oninput="this.nextElementSibling.value = this.value; generatePasswords()">
        <output>10</output>
    </div>

    <button onclick="generatePasswords()">Reroll</button>

    <textarea id="output" readonly></textarea>

    <script src="js/app.js"></script>
</body>
</html>
